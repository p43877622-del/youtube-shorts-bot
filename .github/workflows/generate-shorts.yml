name: Générer et publier un Short automatiquement

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  generate-short:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Installer ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Décoder le token YouTube
        run: |
          python -c "import base64; f=open('token.pickle','wb'); f.write(base64.b64decode('${{ secrets.YOUTUBE_TOKEN }}')); f.close()"

      - name: Copier client_secret
        run: |
          python -c "import base64; f=open('client_secret.json','wb'); f.write(base64.b64decode('${{ secrets.CLIENT_SECRET }}')); f.close()"

      - name: Générer et publier le Short
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python src/main.py
